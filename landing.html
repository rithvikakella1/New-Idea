<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hAIven Health – AI-Powered Code Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f9fafa;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 700px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #111;
    }

    p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 2rem;
    }

    a.button {
      display: inline-block;
      background: #2b65f5;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s ease;
    }

    a.button:hover {
      background: #1a4cd8;
    }

    .tagline {
      font-size: 0.9rem;
      margin-top: 1rem;
      color: #888;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>hAIven Health</h1>
    <p>Automatically extract medical codes (ICD-10, CPT) from clinical notes using AI. Fast, accurate, and effortless.</p>
    <a class="button" href="app.html">Launch the App</a>
    <p class="tagline">Powered by FastAPI & OpenAI</p>
  </div>
</body>
</html>
