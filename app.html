<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>moBILLity – AI Medical Code Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #0f2040;
      --teal: #00c2a8;
      --teal-light: #00e5c7;
      --cream: #f5f2ec;
      --cream-dark: #ede9e0;
      --text-dark: #0a1628;
      --text-mid: #4a5568;
      --text-light: #8896a5;
      --white: #ffffff;
      --border: rgba(10,22,40,0.09);
      --success: #10b981;
      --error: #ef4444;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 5%;
      background: rgba(245,242,236,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.45rem;
      color: var(--navy);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--teal); }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-mid);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--navy); }
    .nav-back {
      background: var(--navy);
      color: var(--white) !important;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      font-size: 0.88rem !important;
      transition: background 0.2s !important;
    }
    .nav-back:hover { background: var(--teal) !important; color: var(--navy) !important; }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .page-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.35rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--teal);
      margin-bottom: 1.2rem;
      box-shadow: 0 2px 10px rgba(0,194,168,0.08);
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: var(--teal);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.5); }
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: -1.5px;
      color: var(--navy);
      line-height: 1.1;
      margin-bottom: 0.7rem;
    }
    .page-header h1 em { font-style: italic; color: var(--teal); }

    .page-header p {
      font-size: 1rem;
      color: var(--text-mid);
      line-height: 1.65;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(10,22,40,0.08);
      overflow: hidden;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .card-chrome {
      background: #f0ede6;
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chrome-dot { width: 11px; height: 11px; border-radius: 50%; }
    .chrome-dot:nth-child(1) { background: #ff5f57; }
    .chrome-dot:nth-child(2) { background: #febc2e; }
    .chrome-dot:nth-child(3) { background: #28c840; }
    .chrome-title {
      margin-left: 0.5rem;
      font-size: 0.73rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.04em;
    }

    .card-body { padding: 2rem 2.2rem; }

    /* ── FORM ── */
    .field-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 0.6rem;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 1rem 1.2rem;
      font-size: 0.93rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      border: 1.5px solid var(--border);
      color: var(--text-dark);
      border-radius: 12px;
      resize: vertical;
      line-height: 1.65;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    textarea::placeholder { color: var(--text-light); font-style: italic; }
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,194,168,0.1);
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .char-count {
      font-size: 0.78rem;
      color: var(--text-light);
    }

    /* ── BUTTON ── */
    .btn-analyze {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--navy);
      color: var(--white);
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(10,22,40,0.18);
    }
    .btn-analyze:hover:not(:disabled) {
      background: var(--teal);
      color: var(--navy);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,194,168,0.28);
    }
    .btn-analyze:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.8rem 0;
    }

    /* ── STATUS ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.4rem;
      min-height: 24px;
    }

    .status-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--cream-dark);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--teal-light));
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .status-msg {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-light);
      white-space: nowrap;
    }
    .status-msg.active { color: var(--teal); }
    .status-msg.done   { color: var(--success); }
    .status-msg.error  { color: var(--error); }

    /* ── RESULTS ── */
    #output { display: none; }
    #output.visible { display: block; animation: fadeUp 0.5s ease both; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .results-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--navy);
    }

    .results-meta {
      font-size: 0.78rem;
      color: var(--text-light);
      font-weight: 500;
    }

    /* Summary chips */
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--navy);
      color: var(--white);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.35rem 0.8rem;
      border-radius: 8px;
      animation: popIn 0.3s ease both;
    }
    .chip-type {
      font-size: 0.6rem;
      color: var(--teal);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
    }

    thead th {
      background: var(--navy);
      color: var(--teal);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.9rem 1rem;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: fadeUp 0.35s ease both;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,194,168,0.04); }

    tbody td {
      padding: 0.9rem 1rem;
      color: var(--text-dark);
      vertical-align: top;
      line-height: 1.5;
    }

    .badge-icd {
      display: inline-block;
      background: rgba(0,194,168,0.12);
      color: var(--teal);
      font-size: 0.68rem;
      font-weight: 800;
      padding: 0.15rem 0.5rem;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-cpt {
      display: inline-block;
      background: rgba(59,130,246,0.1);
      color: #3b82f6;
      font-size: 0.68rem;
      font-weight: 800;
      padding: 0.15rem 0.5rem;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .td-code {
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: var(--navy);
      white-space: nowrap;
    }

    .td-reasoning {
      color: var(--text-mid);
      font-size: 0.83rem;
    }

    /* Error state */
    .error-box {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      color: var(--error);
      font-size: 0.88rem;
      font-weight: 500;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.4);
      padding: 1.8rem 6%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.8rem;
    }
    .footer-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--white);
      text-decoration: none;
    }
    .footer-logo span { color: var(--teal); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .card-body { padding: 1.4rem; }
      main { padding: 2rem 1rem 4rem; }
      footer { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="landing.html">mo<span>BILL</span>ity</a>
    <ul class="nav-links">
      <li><a href="landing.html">Home</a></li>
      <li><a href="landing.html#features">Features</a></li>
      <li><a href="landing.html#compliance">Compliance</a></li>
      <li><a href="landing.html" class="nav-back">← Back to Home</a></li>
    </ul>
  </nav>

  <!-- MAIN -->
  <main>

    <div class="page-header">
      <div class="page-badge"><span class="badge-dot"></span>Live Extraction</div>
      <h1>Medical Code <em>Extractor</em></h1>
      <p>Paste any clinical note below and let our AI identify and map the correct ICD-10 and CPT codes instantly.</p>
    </div>

    <div class="card">
      <div class="card-chrome">
        <div class="chrome-dot"></div>
        <div class="chrome-dot"></div>
        <div class="chrome-dot"></div>
        <span class="chrome-title">moBILLity — Code Extractor</span>
      </div>

      <div class="card-body">

        <label class="field-label" for="noteInput">Clinical Note</label>
        <textarea
          id="noteInput"
          placeholder="e.g. Patient presents with Type 2 diabetes mellitus with diabetic nephropathy. History of essential hypertension. Prescribed metformin and lisinopril…"
        ></textarea>

        <div class="form-footer">
          <span class="char-count" id="charCount">0 characters</span>
          <button class="btn-analyze" id="analyzeBtn" onclick="sendNote()">
            🧠 Analyze Note
          </button>
        </div>

        <div class="divider"></div>

        <div class="status-row">
          <span class="status-label">AI Analysis</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="status-msg" id="statusMsg">Ready</span>
        </div>

        <div id="output"></div>

      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <a class="footer-logo" href="landing.html">mo<span>BILL</span>ity</a>
  </footer>

  <script>
    // Char counter
    const noteInput = document.getElementById('noteInput');
    const charCount = document.getElementById('charCount');
    noteInput.addEventListener('input', () => {
      const n = noteInput.value.length;
      charCount.textContent = `${n} character${n !== 1 ? 's' : ''}`;
    });

    const progressFill = document.getElementById('progressFill');
    const statusMsg    = document.getElementById('statusMsg');
    const analyzeBtn   = document.getElementById('analyzeBtn');
    const output       = document.getElementById('output');

    function setProgress(pct, msg, state = '') {
      progressFill.style.width = pct + '%';
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg' + (state ? ' ' + state : '');
    }

    function setLoading(on) {
      analyzeBtn.disabled = on;
      analyzeBtn.innerHTML = on
        ? '<span class="spinner"></span> Analyzing…'
        : '🧠 Analyze Note';
    }

    function sendNote() {
      const note = noteInput.value.trim();
      if (!note) {
        setProgress(0, 'Please enter a clinical note.', 'error');
        return;
      }

      output.className = '';
      output.innerHTML = '';
      setLoading(true);
      setProgress(20, 'Sending to AI…', 'active');

      let prog = 20;
      const ticker = setInterval(() => {
        prog = Math.min(prog + 3, 85);
        progressFill.style.width = prog + '%';
      }, 300);

      fetch("https://new-idea-ry0n.onrender.com/api/extract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ note })
      })
        .then(r => r.json())
        .then(data => {
          clearInterval(ticker);
          setProgress(100, '✓ Complete', 'done');
          setLoading(false);

          let result = data.result || JSON.stringify(data, null, 2);
          result = result.replace(/```json|```/g, '').trim();

          try {
            const parsed = JSON.parse(result);
            output.innerHTML = formatResults(parsed);
            output.className = 'visible';
          } catch (e) {
            output.innerHTML = `<pre style="font-size:0.85rem;color:var(--text-mid);white-space:pre-wrap;">${result}</pre>`;
            output.className = 'visible';
          }
        })
        .catch(err => {
          clearInterval(ticker);
          setProgress(0, 'Error connecting to server', 'error');
          setLoading(false);
          output.innerHTML = `<div class="error-box">❌ ${err.message}</div>`;
          output.className = 'visible';
        });
    }

    function formatResults(codes) {
      if (!Array.isArray(codes) || codes.length === 0) {
        return '<div class="error-box">⚠️ No codes were found in this note.</div>';
      }

      const chips = codes.map((c, i) => `
        <div class="chip" style="animation-delay:${i * 80}ms">
          <span class="chip-type">${c.code_type || c.type || 'CODE'}</span>${c.code}
        </div>`).join('');

      const rows = codes.map((c, i) => {
        const typeLabel = (c.code_type || '').toUpperCase();
        const badge = (typeLabel === 'ICD-10' || typeLabel === 'ICD')
          ? `<span class="badge-icd">${typeLabel}</span>`
          : `<span class="badge-cpt">${typeLabel || c.type || 'CPT'}</span>`;
        return `<tr style="animation-delay:${i * 60}ms">
          <td>${badge}</td>
          <td class="td-code">${c.code}</td>
          <td>${c.description || '—'}</td>
          <td class="td-reasoning">${c.reasoning || '—'}</td>
        </tr>`;
      }).join('');

      return `
        <div class="results-header">
          <span class="results-title">Extracted Codes</span>
          <span class="results-meta">${codes.length} code${codes.length !== 1 ? 's' : ''} found</span>
        </div>
        <div class="chips-row">${chips}</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Type</th><th>Code</th><th>Description</th><th>Reasoning</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // Cmd/Ctrl+Enter to submit
    noteInput.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') sendNote();
    });
  </script>

</body>
</html>
