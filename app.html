<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>moBILLity – AI Medical Code Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #0f2040;
      --teal: #00c2a8;
      --teal-light: #00e5c7;
      --cream: #f5f2ec;
      --cream-dark: #ede9e0;
      --text-dark: #0a1628;
      --text-mid: #4a5568;
      --text-light: #8896a5;
      --white: #ffffff;
      --border: rgba(10,22,40,0.09);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 5%;
      background: rgba(245,242,236,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.45rem;
      color: var(--navy);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--teal); }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-mid);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--navy); }
    .nav-back {
      background: var(--navy);
      color: var(--white) !important;
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      font-size: 0.88rem !important;
      transition: background 0.2s !important;
    }
    .nav-back:hover { background: var(--teal) !important; color: var(--navy) !important; }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .nav-username {
      font-size: 0.82rem;
      color: var(--text-mid);
      font-weight: 500;
    }
    .btn-logout {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-mid);
      padding: 0.4rem 0.9rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .page-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.35rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--teal);
      margin-bottom: 1.2rem;
      box-shadow: 0 2px 10px rgba(0,194,168,0.08);
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: var(--teal);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.5); }
    }

    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: -1.5px;
      color: var(--navy);
      line-height: 1.1;
      margin-bottom: 0.7rem;
    }
    .page-header h1 em { font-style: italic; color: var(--teal); }

    .page-header p {
      font-size: 1rem;
      color: var(--text-mid);
      line-height: 1.65;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(10,22,40,0.08);
      overflow: hidden;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .card-chrome {
      background: #f0ede6;
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chrome-dot { width: 11px; height: 11px; border-radius: 50%; }
    .chrome-dot:nth-child(1) { background: #ff5f57; }
    .chrome-dot:nth-child(2) { background: #febc2e; }
    .chrome-dot:nth-child(3) { background: #28c840; }
    .chrome-title {
      margin-left: 0.5rem;
      font-size: 0.73rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.04em;
    }

    .card-body { padding: 2rem 2.2rem; }

    /* ── FORM ── */
    .field-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 0.6rem;
      display: block;
    }

    .textarea-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 1rem 1.2rem;
      font-size: 0.93rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      border: 1.5px solid var(--border);
      color: var(--text-dark);
      border-radius: 12px;
      resize: vertical;
      line-height: 1.65;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    textarea::placeholder { color: var(--text-light); font-style: italic; }
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,194,168,0.1);
    }
    textarea.listening {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .form-footer-left {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .char-count {
      font-size: 0.78rem;
      color: var(--text-light);
    }

    /* ── BUTTONS ── */
    .btn-analyze {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--navy);
      color: var(--white);
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(10,22,40,0.18);
    }
    .btn-analyze:hover:not(:disabled) {
      background: var(--teal);
      color: var(--navy);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,194,168,0.28);
    }
    .btn-analyze:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Mic button */
    .btn-mic {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--white);
      color: var(--text-mid);
      padding: 0.8rem 1.2rem;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-mic:hover { border-color: var(--teal); color: var(--teal); }
    .btn-mic.listening {
      background: rgba(239,68,68,0.08);
      border-color: #ef4444;
      color: #ef4444;
    }
    .btn-mic.listening .mic-pulse {
      animation: pulse 1s ease-in-out infinite;
    }
    .mic-no-support { display: none; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.8rem 0;
    }

    /* ── STATUS ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.4rem;
      min-height: 24px;
    }

    .status-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--cream-dark);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--teal-light));
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .status-msg {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-light);
      white-space: nowrap;
    }
    .status-msg.active { color: var(--teal); }
    .status-msg.done   { color: var(--success); }
    .status-msg.error  { color: var(--error); }

    /* ── RESULTS ── */
    #output { display: none; }
    #output.visible { display: block; animation: fadeUp 0.5s ease both; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .results-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--navy);
    }

    .results-meta {
      font-size: 0.78rem;
      color: var(--text-light);
      font-weight: 500;
    }

    /* Summary chips */
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--navy);
      color: var(--white);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.35rem 0.8rem;
      border-radius: 8px;
      animation: popIn 0.3s ease both;
    }
    .chip-type {
      font-size: 0.6rem;
      color: var(--teal);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
    }

    thead th {
      background: var(--navy);
      color: var(--teal);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.9rem 1rem;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      animation: fadeUp 0.35s ease both;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,194,168,0.04); }

    tbody td {
      padding: 0.9rem 1rem;
      color: var(--text-dark);
      vertical-align: middle;
      line-height: 1.5;
    }

    .badge-icd {
      display: inline-block;
      background: rgba(0,194,168,0.12);
      color: var(--teal);
      font-size: 0.68rem;
      font-weight: 800;
      padding: 0.15rem 0.5rem;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-cpt {
      display: inline-block;
      background: rgba(59,130,246,0.1);
      color: #3b82f6;
      font-size: 0.68rem;
      font-weight: 800;
      padding: 0.15rem 0.5rem;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .td-code {
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: var(--navy);
      white-space: nowrap;
    }

    .td-reasoning {
      color: var(--text-mid);
      font-size: 0.83rem;
      max-width: 220px;
    }

    /* Confidence bar */
    .conf-cell { min-width: 110px; }
    .conf-bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .conf-bar {
      flex: 1;
      height: 6px;
      background: var(--cream-dark);
      border-radius: 3px;
      overflow: hidden;
    }
    .conf-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .conf-fill.high { background: var(--success); }
    .conf-fill.med  { background: var(--warning); }
    .conf-fill.low  { background: var(--error); }
    .conf-pct {
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .conf-pct.high { color: var(--success); }
    .conf-pct.med  { color: var(--warning); }
    .conf-pct.low  { color: var(--error); }

    /* Doc strength badge */
    .doc-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .doc-strong { background: rgba(16,185,129,0.12); color: var(--success); }
    .doc-moderate { background: rgba(245,158,11,0.12); color: var(--warning); }
    .doc-weak { background: rgba(239,68,68,0.1); color: var(--error); }

    /* Billing priority tag */
    .priority-tag {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-light);
      text-transform: capitalize;
    }

    /* ── SUGGESTED CODES ── */
    .suggested-section {
      margin-top: 0.5rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .suggested-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.8rem;
    }
    .suggested-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--navy);
    }
    .suggested-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      color: var(--warning);
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .suggested-cards {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .sug-card {
      background: rgba(245,158,11,0.04);
      border: 1px solid rgba(245,158,11,0.18);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      animation: popIn 0.3s ease both;
    }
    .sug-card-top {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }
    .sug-code {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--navy);
    }
    .sug-desc {
      font-size: 0.83rem;
      color: var(--text-mid);
      font-weight: 500;
    }
    .sug-reason {
      font-size: 0.8rem;
      color: var(--text-mid);
      margin-bottom: 0.3rem;
      line-height: 1.5;
    }
    .sug-doc-needed {
      font-size: 0.78rem;
      color: var(--warning);
      font-weight: 600;
    }
    .sug-doc-needed::before { content: '📋 Needs: '; }

    /* Error state */
    .error-box {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      color: var(--error);
      font-size: 0.88rem;
      font-weight: 500;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.4);
      padding: 1.8rem 6%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.8rem;
    }
    .footer-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--white);
      text-decoration: none;
    }
    .footer-logo span { color: var(--teal); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .card-body { padding: 1.4rem; }
      main { padding: 2rem 1rem 4rem; }
      footer { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="/">mo<span>BILL</span>ity</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#features">Features</a></li>
      <li><a href="/#compliance">Compliance</a></li>
      <li><a href="/" class="nav-back">← Back to Home</a></li>
    </ul>
    <div class="nav-user">
      <span class="nav-username" id="navUsername"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <!-- MAIN -->
  <main>

    <div class="page-header">
      <div class="page-badge"><span class="badge-dot"></span>Live Extraction</div>
      <h1>Medical Code <em>Extractor</em></h1>
      <p>Paste or dictate any clinical note and let our AI identify and map the correct ICD-10 and CPT codes instantly.</p>
    </div>

    <div class="card">
      <div class="card-chrome">
        <div class="chrome-dot"></div>
        <div class="chrome-dot"></div>
        <div class="chrome-dot"></div>
        <span class="chrome-title">moBILLity — Code Extractor</span>
      </div>

      <div class="card-body">

        <label class="field-label" for="noteInput">Clinical Note</label>
        <div class="textarea-wrap">
          <textarea
            id="noteInput"
            placeholder="e.g. Patient presents with Type 2 diabetes mellitus with diabetic nephropathy. History of essential hypertension. Prescribed metformin and lisinopril…"
          ></textarea>
        </div>

        <div class="form-footer">
          <div class="form-footer-left">
            <span class="char-count" id="charCount">0 characters</span>
            <!-- Speech-to-Text button (hidden if not supported) -->
            <button class="btn-mic" id="micBtn" onclick="toggleSpeech()" title="Dictate clinical note">
              🎤 Dictate
            </button>
          </div>
          <button class="btn-analyze" id="analyzeBtn" onclick="sendNote()">
            🧠 Analyze Note
          </button>
        </div>

        <div class="divider"></div>

        <div class="status-row">
          <span class="status-label">AI Analysis</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="status-msg" id="statusMsg">Ready</span>
        </div>

        <div id="output"></div>

      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <a class="footer-logo" href="/">mo<span>BILL</span>ity</a>
  </footer>

  <script>
    // ── AUTH GUARD ────────────────────────────────────────────────────────────
    const API_BASE = window.location.origin;

    function isTokenValid(token) {
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.exp * 1000 > Date.now();
      } catch { return false; }
    }

    function getToken() {
      return localStorage.getItem('auth_token');
    }

    function logout() {
      localStorage.removeItem('auth_token');
      window.location.href = '/login';
    }

    (function guardPage() {
      const token = getToken();
      if (!token || !isTokenValid(token)) {
        window.location.href = '/login';
        return;
      }
      // Show username from JWT payload
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const el = document.getElementById('navUsername');
        if (el) el.textContent = payload.full_name || payload.sub;
      } catch {}
    })();

    // ── SPEECH TO TEXT ────────────────────────────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = (event) => {
        let finalText = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalText += event.results[i][0].transcript + ' ';
          }
        }
        if (finalText) {
          const ta = document.getElementById('noteInput');
          ta.value += (ta.value && !ta.value.endsWith(' ') ? ' ' : '') + finalText.trim();
          updateCharCount();
        }
      };

      recognition.onerror = (event) => {
        console.error('Speech error:', event.error);
        if (event.error === 'not-allowed') {
          alert('Microphone access denied. Please allow microphone access and try again.');
        }
        isListening = false;
        updateMicBtn();
      };

      recognition.onend = () => {
        // Restart if still toggled on (handles auto-stop after silence)
        if (isListening) recognition.start();
      };
    } else {
      // Browser doesn't support speech recognition
      const micBtn = document.getElementById('micBtn');
      if (micBtn) micBtn.style.display = 'none';
    }

    function toggleSpeech() {
      if (!recognition) return;
      isListening = !isListening;
      if (isListening) {
        recognition.start();
      } else {
        recognition.stop();
      }
      updateMicBtn();
    }

    function updateMicBtn() {
      const btn = document.getElementById('micBtn');
      const ta  = document.getElementById('noteInput');
      if (!btn) return;
      if (isListening) {
        btn.innerHTML = '🔴 Stop Dictation';
        btn.classList.add('listening');
        ta.classList.add('listening');
        ta.placeholder = 'Listening… speak your clinical note.';
      } else {
        btn.innerHTML = '🎤 Dictate';
        btn.classList.remove('listening');
        ta.classList.remove('listening');
        ta.placeholder = 'e.g. Patient presents with Type 2 diabetes mellitus with diabetic nephropathy…';
      }
    }

    // ── CHAR COUNTER ──────────────────────────────────────────────────────────
    const noteInput = document.getElementById('noteInput');

    function updateCharCount() {
      const n = noteInput.value.length;
      document.getElementById('charCount').textContent = `${n} character${n !== 1 ? 's' : ''}`;
    }
    noteInput.addEventListener('input', updateCharCount);

    // ── PROGRESS / STATUS ─────────────────────────────────────────────────────
    const progressFill = document.getElementById('progressFill');
    const statusMsg    = document.getElementById('statusMsg');
    const analyzeBtn   = document.getElementById('analyzeBtn');
    const output       = document.getElementById('output');

    function setProgress(pct, msg, state = '') {
      progressFill.style.width = pct + '%';
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg' + (state ? ' ' + state : '');
    }

    function setLoading(on) {
      analyzeBtn.disabled = on;
      analyzeBtn.innerHTML = on
        ? '<span class="spinner"></span> Analyzing…'
        : '🧠 Analyze Note';
    }

    // ── MAIN SEND ─────────────────────────────────────────────────────────────
    function sendNote() {
      const note = noteInput.value.trim();
      if (!note) {
        setProgress(0, 'Please enter a clinical note.', 'error');
        return;
      }

      // Stop dictation if active
      if (isListening) {
        isListening = false;
        if (recognition) recognition.stop();
        updateMicBtn();
      }

      output.className = '';
      output.innerHTML = '';
      setLoading(true);
      setProgress(20, 'Sending to AI…', 'active');

      let prog = 20;
      const ticker = setInterval(() => {
        prog = Math.min(prog + 3, 85);
        progressFill.style.width = prog + '%';
      }, 300);

      const token = getToken();

      fetch(`${API_BASE}/api/extract`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ note }),
      })
        .then(r => {
          if (r.status === 401) {
            logout(); // Token expired — redirect to login
            return;
          }
          if (!r.ok) return r.json().then(d => Promise.reject(new Error(d.detail || r.statusText)));
          return r.json();
        })
        .then(data => {
          if (!data) return; // handled by logout redirect
          clearInterval(ticker);
          setProgress(100, '✓ Complete', 'done');
          setLoading(false);

          const result = data.result;
          if (result && (result.confirmed_codes !== undefined)) {
            output.innerHTML = formatResults(result);
          } else {
            // Fallback for unexpected shapes
            output.innerHTML = `<pre style="font-size:0.85rem;color:var(--text-mid);white-space:pre-wrap;">${JSON.stringify(result, null, 2)}</pre>`;
          }
          output.className = 'visible';
        })
        .catch(err => {
          clearInterval(ticker);
          setProgress(0, 'Error connecting to server', 'error');
          setLoading(false);
          output.innerHTML = `<div class="error-box">❌ ${err.message}</div>`;
          output.className = 'visible';
        });
    }

    // ── FORMAT RESULTS ────────────────────────────────────────────────────────
    function confClass(conf) {
      return conf >= 0.8 ? 'high' : conf >= 0.5 ? 'med' : 'low';
    }

    function docBadge(strength) {
      const map = {
        strong:   '<span class="doc-badge doc-strong">Strong</span>',
        moderate: '<span class="doc-badge doc-moderate">Moderate</span>',
        weak:     '<span class="doc-badge doc-weak">Weak</span>',
      };
      return map[(strength || '').toLowerCase()] || '';
    }

    function formatResults(data) {
      const confirmed = Array.isArray(data.confirmed_codes) ? data.confirmed_codes : [];
      const suggested = Array.isArray(data.suggested_codes) ? data.suggested_codes : [];

      if (confirmed.length === 0 && suggested.length === 0) {
        return '<div class="error-box">⚠️ No codes were found in this note.</div>';
      }

      // ── Chips row
      const chips = confirmed.map((c, i) => `
        <div class="chip" style="animation-delay:${i * 80}ms">
          <span class="chip-type">${c.code_type || c.type || 'CODE'}</span>${c.code}
        </div>`).join('');

      // ── Confirmed codes table
      const rows = confirmed.map((c, i) => {
        const typeLabel = (c.code_type || '').toUpperCase();
        const badge = (typeLabel === 'ICD-10' || typeLabel === 'ICD')
          ? `<span class="badge-icd">${typeLabel}</span>`
          : `<span class="badge-cpt">${typeLabel || c.type || 'CPT'}</span>`;

        const conf    = parseFloat(c.confidence) || 0;
        const pct     = Math.round(conf * 100);
        const cls     = confClass(conf);

        return `<tr style="animation-delay:${i * 60}ms">
          <td>${badge}<br><span class="priority-tag">${c.billing_priority || ''}</span></td>
          <td class="td-code">${c.code}</td>
          <td>${c.description || '—'}</td>
          <td class="td-reasoning">${c.reasoning || '—'}</td>
          <td>${docBadge(c.documentation_strength)}</td>
          <td class="conf-cell">
            <div class="conf-bar-wrap">
              <div class="conf-bar"><div class="conf-fill ${cls}" style="width:${pct}%"></div></div>
              <span class="conf-pct ${cls}">${pct}%</span>
            </div>
          </td>
        </tr>`;
      }).join('');

      // ── Suggested codes section
      let suggestedHtml = '';
      if (suggested.length > 0) {
        const sugCards = suggested.map((s, i) => {
          const typeLabel = (s.code_type || '').toUpperCase();
          const badge = (typeLabel === 'ICD-10' || typeLabel === 'ICD')
            ? `<span class="badge-icd">${typeLabel}</span>`
            : `<span class="badge-cpt">${typeLabel}</span>`;
          return `
          <div class="sug-card" style="animation-delay:${i * 60}ms">
            <div class="sug-card-top">
              ${badge}
              <span class="sug-code">${s.code}</span>
              <span class="sug-desc">${s.description || ''}</span>
            </div>
            <p class="sug-reason">${s.reason_suggested || ''}</p>
            ${s.documentation_needed ? `<p class="sug-doc-needed">${s.documentation_needed}</p>` : ''}
          </div>`;
        }).join('');

        suggestedHtml = `
          <div class="suggested-section">
            <div class="suggested-header">
              <span class="results-title">Suggested Codes</span>
              <span class="suggested-badge">⚠ Needs Clarification</span>
            </div>
            <p style="font-size:0.82rem;color:var(--text-light);margin-bottom:0.8rem;">
              These codes may apply based on clinical context but require physician confirmation or additional documentation before billing.
            </p>
            <div class="suggested-cards">${sugCards}</div>
          </div>`;
      }

      return `
        <div class="results-header">
          <span class="results-title">Confirmed Codes</span>
          <span class="results-meta">${confirmed.length} code${confirmed.length !== 1 ? 's' : ''} found</span>
        </div>
        <div class="chips-row">${chips}</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Type</th>
                <th>Code</th>
                <th>Description</th>
                <th>Clinical Reasoning</th>
                <th>Documentation</th>
                <th>Confidence</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${suggestedHtml}`;
    }

    // Cmd/Ctrl+Enter to submit
    noteInput.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') sendNote();
    });
  </script>

</body>
</html>
