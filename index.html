<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🧠 AI Medical Code Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0e0e2c;
      color: #ffffff;
      font-family: 'Helvetica Neue', 'Montserrat', Arial, sans-serif;
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      text-align: center;
      font-size: 2em;
      color: #00ffe5;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      font-size: 1.1em;
      background-color: #1a1a40;
      border: 1px solid #00ffe5;
      color: #fff;
      border-radius: 10px;
      resize: vertical;
    }

    button {
      display: block;
      margin: 20px auto 0;
      padding: 12px 28px;
      font-size: 1.1em;
      background: linear-gradient(135deg, #00ffe5, #0051ff);
      color: #0e0e2c;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00ffe5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      animation: fadeIn 0.8s ease-in;
    }

    th, td {
      border: 1px solid #333;
      padding: 12px;
      text-align: left;
    }

    th {
      background-color: #222851;
      color: #00ffe5;
    }

    td {
      background-color: #161636;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #output {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h2>🧬 AI Medical Code Extractor</h2>
  <textarea id="noteInput" placeholder="📝 Enter clinical note here..."></textarea>
  <button onclick="sendNote()">🧠 Analyze</button>

  <div id="output"></div>

  <script>
    function sendNote() {
      const note = document.getElementById("noteInput").value;
      const output = document.getElementById("output");
      output.innerHTML = "<p>⏳ Analyzing note...</p>";

      fetch("https://new-idea-ry0n.onrender.com/api/extract", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ note: note })
      })
        .then(response => response.json())
        .then(data => {
          let result = data.result || JSON.stringify(data, null, 2);

          result = result.replace(/```json|```/g, '').trim();

          try {
            const parsed = JSON.parse(result);
            output.innerHTML = formatTable(parsed);
          } catch (e) {
            output.innerHTML = `<pre>${result}</pre>`;
          }
        })
        .catch(error => {
          output.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
        });
    }

    function formatTable(codes) {
      if (!Array.isArray(codes)) return "⚠️ Unexpected response format.";

      let table = `
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Code Type</th>
              <th>Code</th>
              <th>Description</th>
              <th>Reasoning</th>
            </tr>
          </thead>
          <tbody>
      `;

      for (const code of codes) {
        table += `
          <tr>
            <td>${code.type}</td>
            <td>${code.code_type}</td>
            <td>${code.code}</td>
            <td>${code.description}</td>
            <td>${code.reasoning}</td>
          </tr>
        `;
      }

      table += `</tbody></table>`;
      return table;
    }
  </script>

</body>
</html>
