<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Medical Code Extractor</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    h2 {
      text-align: center;
      color: #444;
    }

    textarea {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      resize: vertical;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #output {
      margin-top: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
      color: #333;
      font-weight: bold;
    }

    tr:hover {
      background-color: #fafafa;
    }

    .loading {
      font-style: italic;
      color: #666;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>

  <h2>Medical Code Extractor</h2>
  <textarea id="noteInput" rows="6" placeholder="Enter clinical note..."></textarea><br>
  <button onclick="sendNote()">Submit</button>

  <div id="output"></div>

  <script>
    function sendNote() {
      const note = document.getElementById("noteInput").value;
      const output = document.getElementById("output");
      output.innerHTML = "<p class='loading'>Processing...</p>";

      fetch("https://new-idea-ry0n.onrender.com/api/extract", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ note: note })
      })
        .then(response => response.json())
        .then(data => {
          let result = data.result || JSON.stringify(data, null, 2);
          result = result.replace(/```json|```/g, '').trim();

          try {
            const parsed = JSON.parse(result);
            output.innerHTML = "<h3>Extracted Medical Codes:</h3>" + formatTable(parsed);
          } catch (e) {
            output.innerHTML = `<pre>${result}</pre>`;
          }
        })
        .catch(error => {
          output.innerHTML = `<p class='error'>Error: ${error.message}</p>`;
        });
    }

    function formatTable(codes) {
      if (!Array.isArray(codes)) return "Unexpected response format.";

      let table = `
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Code Type</th>
              <th>Code</th>
              <th>Description</th>
              <th>Reasoning</th>
            </tr>
          </thead>
          <tbody>
      `;

      for (const code of codes) {
        table += `
          <tr>
            <td>${code.type}</td>
            <td>${code.code_type}</td>
            <td>${code.code}</td>
            <td>${code.description}</td>
            <td>${code.reasoning}</td>
          </tr>
        `;
      }

      table += `</tbody></table>`;
      return table;
    }
  </script>

</body>
</html>
